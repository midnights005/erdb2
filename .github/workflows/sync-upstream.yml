name: Sync upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/realbestia1/erdb.git
          git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          COUNT=$(git rev-list --count HEAD..upstream/main)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Create sync branch
        if: steps.check.outputs.count != '0'
        run: |
          BRANCH="upstream-sync-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        id: sync

      - name: Open pull request
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.sync.outputs.branch }}" \
            --title "chore: sync upstream" \
            --body "Automated upstream sync from [realbestia1/erdb](https://github.com/realbestia1/erdb)."
