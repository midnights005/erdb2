name: Create GitHub Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

concurrency:
  group: create-github-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true